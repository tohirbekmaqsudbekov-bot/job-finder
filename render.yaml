services:
  - type: web
    name: job-finder-backend
    env: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn backend.app:app --workers 3 --threads 2 --timeout 120"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_ORIGINS
        value: "https://your-app.netlify.app"
        sync: false
      - key: RATE_LIMIT_WINDOW
        value: "60"
        sync: false
      - key: RATE_LIMIT_MAX
        value: "30"
